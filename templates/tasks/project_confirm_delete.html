{% extends 'base.html' %}
{% block title %}Delete Project — TaskFlow{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger border-0 shadow-sm">
            <div class="card-body text-center p-5">
                <h4>Delete Project?</h4>
                <p class="text-muted">You're about to delete <strong>{{ project.title }}</strong> and all its tasks. This action cannot be undone.</p>
                <form method="post" class="d-flex gap-3 justify-content-center mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        Yes, Delete
                    </button>
                    <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
