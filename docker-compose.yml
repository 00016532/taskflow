services:

  web:
    image: ${DOCKERHUB_USERNAME:-yourusername}/taskflow:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    expose:
      - "8000"

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - app_network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot
             --email ${ADMIN_EMAIL:-admin@example.com}
             --agree-tos --no-eff-email
             -d ${DOMAIN:-localhost}
    profiles:
      - certbot   # only runs when explicitly called: docker compose --profile certbot up certbot

volumes:
  postgres_data:      # persists database between container restarts
  static_volume:      # shared between Django and Nginx for static files
  media_volume:       # shared between Django and Nginx for user uploads
  certbot_certs:      # SSL certificates
  certbot_www:        # certbot webroot challenge files

networks:
  app_network:
    driver: bridge
