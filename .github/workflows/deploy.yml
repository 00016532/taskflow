name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow

jobs:

  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: taskmanager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8 (code quality check)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=127 --statistics

      - name: Run pytest (automated tests)
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
          POSTGRES_DB: taskmanager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          pytest tasks/tests.py -v --tb=short

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test   # only runs if tests pass
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build   # only runs after image is pushed
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/taskflow

            # Pull the latest image from Docker Hub
            echo "Pulling latest image..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop old containers (gracefully)
            echo "Stopping old containers..."
            docker compose down --remove-orphans

            # Start new containers with updated image
            echo "Starting new containers..."
            IMAGE_TAG=latest docker compose up -d

            # Run database migrations
            echo "Running migrations..."
            docker compose exec -T web python manage.py migrate --noinput

            # Collect static files
            echo "Collecting static files..."
            docker compose exec -T web python manage.py collectstatic --noinput

            # Remove unused Docker images to save disk space
            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment complete!"
